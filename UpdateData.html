        body {
            background-color: #1e2233;

            line-height: 1.6;
        }

        /* 提示框样式 */
        .tip-box {
            background-color: #1a332e;
            border: 2px solid #7ccd7c;
            border-radius: 16px;
            padding: 20px 24px;
            display: flex;
            align-items: flex-start;

            max-width: 800px;

            height: 40px;
            background-color: #7ccd7c;

            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .check-icon::after {
            content: "✔";
            color: #1a332e;
            font-size: 22px;
            font-weight: bold;
        }

        .tip-text {
            color: #ffffff;
            font-size: 18px;
            margin: 0;
        }

        /* 按钮样式优化 */
        button {
            background-color: #2c3e50;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px 4px 4px 0;
            font-size: 14px;
        }
        button:hover:not(:disabled) {
            background-color: #34495e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
